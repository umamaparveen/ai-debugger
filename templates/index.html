<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Debugger</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 40px;
        }

        textarea {
            width: 80%;
            height: 200px;
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
        }

        select, button {
            padding: 10px;
            margin-top: 15px;
            border-radius: 6px;
            border: none;
        }

        button {
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        .result {
            margin-top: 30px;
            background: #111827;
            padding: 20px;
            border-radius: 10px;
            white-space: pre-wrap;
            text-align: left;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>

<body>

<h1>🚀 AI Debugger</h1>

<form action="/debug" method="POST">

    <select name="language">
        <option value="python">Python</option>
        <option value="java">Java</option>
        <option value="cpp">C++</option>
    </select>

    <br>

    <textarea name="code" placeholder="Paste your code here..." required></textarea>

    <br>

    <button type="submit">Debug Code</button>

</form>

{% if result %}
<div class="result">
{{ result }}
</div>
{% endif %}

</body>
</html>

{% if result %}
<div class="result-box">

    {% if result.status == "success" %}
        <h3>{{ result.message }}</h3>

    {% else %}
        <h3>🚨 Debug Report</h3>

        <p><b>Error Type:</b> {{ result.error_type }}</p>
        <p><b>Line Number:</b> {{ result.line }}</p>
        <p><b>Problem:</b> {{ result.details }}</p>
        <p><b>Suggested Fix:</b> {{ result.fix }}</p>

    {% endif %}

</div>
{% endif %}
